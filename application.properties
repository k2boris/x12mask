# Top-level application configuration for X12 masking pipeline.

# app.input.dir: Directory scanned by Stage 1 for inbound X12 files.
app.input.dir=data/in

# app.output.dir: Directory where masked X12 output files are written by Stage 2.
app.output.dir=data/out

# app.trace.dir: Directory for extracted/masked JSON traces, reconstruction traces, and transaction context files.
app.trace.dir=data/trace

# app.log.level: Application log verbosity (SEVERE, WARNING, INFO, FINE, or project-specific DEBUG mapping).
app.log.level=DEBUG

# app.pipeline.mode: Runtime path selector; use sqlite_staging for SQLite-first staging flow, direct_jdbc for legacy direct JDBC load.
app.pipeline.mode=sqlite_staging

# app.transaction.start: Starting numeric suffix used to generate transaction IDs as TXN-<n> during Stage 1 batch.
app.transaction.start=1002

# app.connector.dir: Local connector directory that stores SQLite staging artifacts.
app.connector.dir=connector

# app.jdbc.url: K2view Fabric JDBC connection string used for Stage 2 masked reads.
app.jdbc.url=jdbc:fabric://localhost:5124/masking?user=admin&password=admin

# app.jdbc.session.init.template: JDBC session initialization command template; %s is replaced by transaction_id.
app.jdbc.session.init.template=GET X12Mask.'%s'

# app.sqlite.jdbc.url: JDBC URL of the local SQLite staging database used in Stage 1.
app.sqlite.jdbc.url=jdbc:sqlite:connector/x12-staging.db

# app.sqlite.schema.file: SQL schema file used to bootstrap/reinitialize the SQLite staging database.
app.sqlite.schema.file=connector/schema.sql

# app.docker.k2.container: Docker container name for optional DB sync after process/clear scripts.
app.docker.k2.container=masking-fabric

# app.docker.k2.db.dest: Destination DB file path inside the Docker container for staging DB copy.
app.docker.k2.db.dest=/opt/apps/fabric/data/x12-staging.db

# app.file.pattern: Regex filter applied to filenames in app.input.dir during Stage 1 batch discovery.
app.file.pattern=.*\\.x12$

# app.batch.fail.fast: If true, Stage 1 stops on first file error; if false, it continues processing remaining files.
app.batch.fail.fast=false

# app.read.tables: Comma-separated table list read from K2view JDBC in Stage 2 to build masked JSON and masked X12.
app.read.tables=biz_submitter_entity,biz_receiver_entity,biz_billing_provider_entity,biz_payto_provider_entity,biz_payer_entity,biz_person_entity,biz_person_name,biz_person_demographic,biz_person_identifier,biz_person_address,biz_provider_entity,biz_service_facility_entity,biz_claim_entity,biz_claim_policy_context,biz_claim_flags,biz_claim_date,biz_claim_identifier,biz_claim_attachment,biz_claim_condition,biz_claim_note,biz_claim_diagnosis,biz_claim_provider_role,biz_claim_service_facility,biz_service_line_entity,biz_service_line_identifier,map_parser_profile,map_x12_locator,map_extraction_rule,map_phi_classification_rule,map_canonical_binding,map_replacement_manifest_rule

# app.clear.tables: Legacy direct-JDBC child->parent delete order for transaction-scoped clear utilities (not used by demo full-reset script).
app.clear.tables=biz_service_line_identifier,biz_service_line_entity,biz_claim_provider_role,biz_claim_service_facility,biz_claim_diagnosis,biz_claim_note,biz_claim_condition,biz_claim_attachment,biz_claim_identifier,biz_claim_date,biz_claim_flags,biz_claim_policy_context,biz_claim_entity,biz_person_name,biz_person_demographic,biz_person_identifier,biz_person_address,biz_person_entity,biz_provider_entity,biz_service_facility_entity,biz_submitter_entity,biz_receiver_entity,biz_billing_provider_entity,biz_payto_provider_entity,biz_payer_entity,map_canonical_binding,map_x12_locator,map_extraction_rule,map_phi_classification_rule,map_replacement_manifest_rule,map_parser_profile,biz_transaction_entity

# app.sqlite.clear.tables: SQLite-specific child->parent delete order for transaction-scoped clear operations.
app.sqlite.clear.tables=biz_service_line_identifier,biz_service_line_entity,biz_claim_provider_role,biz_claim_service_facility,biz_claim_diagnosis,biz_claim_note,biz_claim_condition,biz_claim_attachment,biz_claim_identifier,biz_claim_date,biz_claim_flags,biz_claim_policy_context,biz_claim_entity,biz_person_name,biz_person_demographic,biz_person_identifier,biz_person_address,biz_person_entity,biz_provider_entity,biz_service_facility_entity,biz_submitter_entity,biz_receiver_entity,biz_billing_provider_entity,biz_payto_provider_entity,biz_payer_entity,map_canonical_binding,map_x12_locator,map_extraction_rule,map_phi_classification_rule,map_replacement_manifest_rule,map_parser_profile,biz_transaction_entity
